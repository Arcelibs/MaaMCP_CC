name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastmcp MaaFw opencv-python

      - name: Check syntax
        run: python -c "import ast; ast.parse(open('server.py', encoding='utf-8').read()); print('Syntax OK')"

      - name: Check imports
        run: |
          python -c "
          from fastmcp import FastMCP
          from maa.controller import AdbController, Win32Controller
          from maa.pipeline import JRecognitionType, JOCR, JTemplateMatch
          from maa.resource import Resource
          from maa.tasker import Tasker
          from maa.toolkit import Toolkit
          import cv2
          print('All imports OK')
          "

      - name: Check package builds
        run: |
          pip install build
          python -m build
